<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase bus tickets online</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <header>
    <div class="top-bar">
      <img class="logo" src="site-logo.png" alt="website logo">

      <nav class="navigation">
        <ul>
          <li><a href="#" class="highlighted-link">Bus</a></li>
          <li><a href="#">Train</a></li>
          <li><a href="#">Profile</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="dashboard-container">
      <div class="dashboard">
        <!-- Radio buttons -->
        <label for="one-way">One way</label>
        <input type="radio" name="trip-type" id="one-way" value="one-way">
        <label for="round-way">Round way</label>
        <input type="radio" name="trip-type" id="round-way" value="round-way">
        <br>

        <!-- Fields -->
        <div class="dashboard-item-container">
          <div class="dashboard-item">
            <label for="location-from">From</label>
            <input type="search" name="location-field" id="location-from" value="From">
          </div>

          <div class="dashboard-item">
            <label for="location-to">To</label>
            <input type="search" name="location-field" id="location-to" value="To">
          </div>

          <div class="dashboard-item">
            <label for="trip-date">Journey date</label>
            <input type="date" name="ticket-date" id="trip-date" value="Pick a date">
          </div>

          <div class="dashboard-item">
            <button type="submit">Search</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="main-content">
      <p><strong>Copyright</strong>: Sadakatu Tanzil</p>
    </div>
  </footer>

  <script src="index.js"></script>
</body>

</html>
